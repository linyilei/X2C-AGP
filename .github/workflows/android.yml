name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Compile sample app
        run: ./gradlew --no-daemon :app:compileDebugJavaWithJavac

      - name: Verify runtime publication metadata
        run: JITPACK=true ./gradlew --no-daemon :x2c-runtime:generatePomFileForReleasePublication

      - name: Verify plugin publication metadata
        run: ./gradlew --no-daemon -p x2c-gradle-plugin generatePomFileForPluginMavenPublication
